AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  V4-5b Verification Scanner — EventBridge-triggered Lambda that queries
  DDB GSI for pending predictions and invokes the verification agent.

  NOTE: The calledit-db table is not CloudFormation-managed. The GSI must
  be created separately via setup_gsi.sh before deploying this stack.
  Run: bash infrastructure/verification-scanner/setup_gsi.sh

Parameters:
  DynamoDBTableName:
    Type: String
    Default: calledit-v4
  GSIName:
    Type: String
    Default: status-verification_date-index
  VerificationAgentId:
    Type: String
    Default: ""
    Description: AgentCore runtime ID for production invocation
  VerificationAgentEndpoint:
    Type: String
    Default: ""
    Description: HTTP endpoint for dev mode (e.g., http://localhost:8080)

Resources:
  VerificationScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.12
      Handler: scanner.lambda_handler
      CodeUri: .
      Timeout: 900
      MemorySize: 256
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref DynamoDBTableName
          GSI_NAME: !Ref GSIName
          VERIFICATION_AGENT_ID: !Ref VerificationAgentId
          VERIFICATION_AGENT_ENDPOINT: !Ref VerificationAgentEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoDBTableName
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}/index/${GSIName}"
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeAgent
                - bedrock-agentcore:InvokeRuntime
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - sts:GetCallerIdentity
              Resource: "*"
      Events:
        ScheduledScan:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: Scan for predictions due for verification
            Enabled: true

Outputs:
  VerificationScannerFunctionArn:
    Value: !Sub '${VerificationScannerFunction.Arn}:live'
    Description: Scanner Lambda alias ARN (SnapStart)
  VerificationScannerFunctionName:
    Value: !Ref VerificationScannerFunction
    Description: Scanner Lambda function name
