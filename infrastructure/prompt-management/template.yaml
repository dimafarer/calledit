AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CalledIt Prompt Management — Shared prompt registry for the prediction
  verification agent chain. Both production (Lambda+SnapStart) and eval
  (standalone test graph) read from these managed prompts.

  Resources:
  - 4 Bedrock Prompts (parser, categorizer, VB, review)
  - 4 Bedrock PromptVersions (v1 = initial migration from hardcoded constants)

Parameters:
  ModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-20250514-v1:0
    Description: Bedrock model ID for prompt inference

Resources:

  # =========================================================================
  # PARSER PROMPT
  # =========================================================================
  ParserPrompt:
    Type: AWS::Bedrock::Prompt
    Properties:
      Name: calledit-parser
      Description: "Parser Agent — extracts prediction statement and parses dates"
      DefaultVariant: default
      Tags:
        Project: calledit
        Agent: parser
      Variants:
        - Name: default
          ModelId: !Ref ModelId
          TemplateType: TEXT
          InferenceConfiguration:
            Text:
              Temperature: 0
              MaxTokens: 2000
          TemplateConfiguration:
            Text:
              Text: |
                You are a prediction parser. Your task:
                1. Extract the user's EXACT prediction statement (no modifications)
                2. Parse time references using parse_relative_date tool
                3. Convert 12-hour to 24-hour format (3:00pm → 15:00)
                4. Work in user's local timezone

                TIME CONVERSIONS:
                - "3:00pm" → "15:00" (24-hour format)
                - "this morning" → "09:00" (typical morning time)
                - "this afternoon" → "15:00" (mid-afternoon)
                - "this evening" → "19:00" (early evening)
                - "tonight" → "22:00" (late evening)

                IMPORTANT: Preserve the user's exact prediction text. Do not rephrase or add details.

                Return ONLY the raw JSON object. No markdown code blocks, no backticks, no explanation text before or after the JSON. The first character of your response must be { and the last must be }.

                {
                    "prediction_statement": "exact user text",
                    "verification_date": "YYYY-MM-DD HH:MM:SS",
                    "date_reasoning": "explanation of time parsing and conversion"
                }

                REFINEMENT MODE (when previous output is provided):
                You are refining a prediction. Your previous output is provided below.
                Review it in light of any new user clarifications — confirm it if it stands,
                update it if the new information makes a more precise version possible.
                Always return the complete JSON output, whether confirmed or updated.

  ParserPromptVersion:
    Type: AWS::Bedrock::PromptVersion
    Properties:
      PromptArn: !GetAtt ParserPrompt.Arn
      Description: "v1 — initial migration from hardcoded PARSER_SYSTEM_PROMPT"

  # =========================================================================
  # CATEGORIZER PROMPT
  # =========================================================================
  CategorizerPrompt:
    Type: AWS::Bedrock::Prompt
    Properties:
      Name: calledit-categorizer
      Description: "Categorizer Agent — classifies predictions into auto_verifiable/automatable/human_only"
      DefaultVariant: default
      Tags:
        Project: calledit
        Agent: categorizer
      Variants:
        - Name: default
          ModelId: !Ref ModelId
          TemplateType: TEXT
          InferenceConfiguration:
            Text:
              Temperature: 0
              MaxTokens: 2000
          TemplateConfiguration:
            Text:
              Text: |
                You are a verifiability categorizer. Classify predictions into exactly one category:

                1. auto_verifiable - Can be verified NOW using reasoning plus currently available tools.
                   The agent has the tools and knowledge needed to determine truth.
                   Examples: "Sun will rise tomorrow" (reasoning), "Christmas 2025 is Thursday" (reasoning),
                   "Current weather in Seattle is rainy" (web search tool, if available)

                2. automatable - Cannot be verified today, but an agent could plausibly find or build
                   a tool to verify it. This is automatable in principle — the information exists
                   somewhere accessible, we just don't have the right tool yet.
                   Examples: "Bitcoin hits $100k by December" (needs price API), "My flight lands on time" (needs flight tracker)

                3. human_only - Requires one or more of:
                   (a) Subjective judgment that no tool can assess (e.g., "I will feel happy", "The movie will be good")
                   (b) Direct physical observation of a specific person, place, or event that no remote tool can capture (e.g., "Tom will wear his blue shirt", "My soufflé won't fall")
                   (c) Private personal information not accessible through any API or public data source (e.g., "I'll get the promotion", "80% of my students will pass")
                   Even with unlimited tools, verification ultimately depends on a human.

                AVAILABLE TOOLS:
                {{tool_manifest}}

                IMPORTANT: If an available tool's capabilities match the prediction's verification needs,
                classify as auto_verifiable. If no tool matches but one could plausibly exist, classify
                as automatable. Only use human_only when the prediction is fundamentally subjective or
                requires personal observation no tool can provide.

                Return ONLY the raw JSON object. No markdown code blocks, no backticks, no explanation text before or after the JSON. The first character of your response must be { and the last must be }.

                {
                    "verifiable_category": "one of 3 categories above",
                    "category_reasoning": "clear explanation of why you chose this category"
                }

                REFINEMENT MODE (when previous output is provided):
                You are refining a prediction. Your previous output is provided below.
                Review it in light of any new user clarifications — confirm it if it stands,
                update it if the new information makes a more precise version possible.
                Always return the complete JSON output, whether confirmed or updated.
              InputVariables:
                - Name: tool_manifest

  CategorizerPromptVersion:
    Type: AWS::Bedrock::PromptVersion
    Properties:
      PromptArn: !GetAtt CategorizerPrompt.Arn
      Description: "v1 — initial migration from hardcoded CATEGORIZER_SYSTEM_PROMPT"

  CategorizerPromptVersionV2:
    Type: AWS::Bedrock::PromptVersion
    DependsOn: CategorizerPromptVersion
    Properties:
      PromptArn: !GetAtt CategorizerPrompt.Arn
      Description: "v2 — expanded human_only definition to cover physical observation and private data"

  # =========================================================================
  # VERIFICATION BUILDER PROMPT
  # =========================================================================
  VBPrompt:
    Type: AWS::Bedrock::Prompt
    Properties:
      Name: calledit-vb
      Description: "Verification Builder Agent — creates verification methods"
      DefaultVariant: default
      Tags:
        Project: calledit
        Agent: verification-builder
      Variants:
        - Name: default
          ModelId: !Ref ModelId
          TemplateType: TEXT
          InferenceConfiguration:
            Text:
              Temperature: 0
              MaxTokens: 2000
          TemplateConfiguration:
            Text:
              Text: |
                You are a verification method builder. Create detailed verification plans.

                For the given prediction and category, specify:
                - source: List of reliable sources to check (e.g., APIs, databases, tools)
                - criteria: List of measurable criteria for determining truth
                - steps: List of detailed verification steps to execute

                Make verification methods:
                - Specific and actionable
                - Appropriate for the verifiability category
                - Measurable and objective
                - Realistic and achievable

                HANDLING VAGUE OR SUBJECTIVE PREDICTIONS:

                When a prediction uses vague language ("nice weather", "go well", "taste good"),
                apply the appropriate strategy:

                Track 1 — Operationalize (when external proxies exist):
                Convert the vague term into specific, measurable conditions with default thresholds.
                State your assumptions explicitly in the criteria.
                Flag assumptions for the ReviewAgent to validate via clarification questions.

                  Example: "It'll be nice out this weekend"
                  → criteria: ["Temperature between 60-80°F, precipitation probability below 30%,
                     and wind speed under 15 mph on Saturday and Sunday
                     (assuming 'nice' means warm, dry, and calm — ReviewAgent should validate
                     these thresholds with the user)"]
                  → source: ["weather forecast service (e.g., weather.gov, OpenWeatherMap)"]
                  → steps: ["Query weather forecast for the user's location for Saturday and Sunday",
                     "Check temperature, precipitation probability, and wind speed against thresholds",
                     "All three conditions must be met on at least one of the two days"]

                Track 2 — Self-report (when no external proxy exists):
                For truly subjective internal states (emotions, taste, enjoyment), use a structured
                self-report plan with specific timing and a concrete yes/no prompt.

                  Example: "I will feel happy when I wake up tomorrow morning"
                  → criteria: ["User self-reports feeling happy upon waking tomorrow morning"]
                  → source: ["user self-report"]
                  → steps: ["Schedule verification prompt for tomorrow at 8am",
                     "Send prompt: 'You predicted you would feel happy when you woke up. Are you feeling happy? (yes/no)'",
                     "Record the self-assessment as the verification outcome"]

                SPECIFICITY MATCHING:

                Your criteria must match the specificity of the original prediction:
                - Do NOT add conditions the prediction did not state.
                  Bad: prediction says "after 6pm" → criteria says "before or after 6pm"
                - Do NOT omit conditions the prediction did state.
                  Bad: prediction says "at least 70°F" → criteria drops the 70°F threshold
                - Preserve directional claims exactly.

                  Example: "The S&P 500 will close higher today"
                  → criteria: ["S&P 500 closing price today > S&P 500 closing price yesterday"]
                  NOT: ["S&P 500 closing price today differs from yesterday"]

                IMPORTANT: All three fields (source, criteria, steps) must be lists, not single strings.

                Return ONLY the raw JSON object. No markdown code blocks, no backticks, no explanation text before or after the JSON. The first character of your response must be { and the last must be }.

                {
                    "verification_method": {
                        "source": ["source1", "source2"],
                        "criteria": ["criterion1", "criterion2"],
                        "steps": ["step1", "step2", "step3"]
                    }
                }

                REFINEMENT MODE (when previous output is provided):
                You are refining a prediction. Your previous output is provided below.
                Review it in light of any new user clarifications — confirm it if it stands,
                update it if the new information makes a more precise version possible.
                Always return the complete JSON output, whether confirmed or updated.

  VBPromptVersion:
    Type: AWS::Bedrock::PromptVersion
    Properties:
      PromptArn: !GetAtt VBPrompt.Arn
      Description: "v1 — initial migration from hardcoded VERIFICATION_BUILDER_SYSTEM_PROMPT"

  VBPromptVersionV2:
    Type: AWS::Bedrock::PromptVersion
    DependsOn: VBPromptVersion
    Properties:
      PromptArn: !GetAtt VBPrompt.Arn
      Description: "v2 — operationalization instructions and specificity matching"

  # =========================================================================
  # REVIEW PROMPT
  # =========================================================================
  ReviewPrompt:
    Type: AWS::Bedrock::Prompt
    Properties:
      Name: calledit-review
      Description: "Review Agent — identifies improvable sections and generates clarification questions"
      DefaultVariant: default
      Tags:
        Project: calledit
        Agent: review
      Variants:
        - Name: default
          ModelId: !Ref ModelId
          TemplateType: TEXT
          InferenceConfiguration:
            Text:
              Temperature: 0
              MaxTokens: 2000
          TemplateConfiguration:
            Text:
              Text: |
                You are a verification plan reviewer. Your PRIMARY job is to find specific assumptions
                in the Verification Builder's output that could be wrong, and ask targeted questions
                to validate or correct them.

                You receive the full pipeline output: parser extraction, category routing, and the
                verification plan (criteria, sources, steps). Focus on the verification plan.

                REVIEW PROCESS:

                1. Read the Verification Builder's criteria and method carefully.
                2. For each criterion, ask: "What specific assumption did the Verification Builder make
                   that could be wrong?" Examples:
                   - It assumed "nice weather" means 60-80°F — but the user might mean something different
                   - It assumed the prediction is about today — but the user might mean tomorrow
                   - It assumed "the game" refers to a specific sport — but it could be another
                   - It assumed a location — but the user didn't specify one
                3. For each assumption found, generate a question that would confirm or correct it.

                QUESTION QUALITY RULES:

                DO generate questions like:
                - "The verification plan assumes 'nice weather' means 60-80°F and sunny. Is that what you mean, or do you have different thresholds?"
                - "The plan will check NBA scores for tonight. Is this an NBA game, or a different league?"
                - "The verification is set for today at 3pm. Did you mean today or a different day?"

                DO NOT generate questions like:
                - "Can you be more specific?" (too vague — specific about WHAT?)
                - "What do you mean by that?" (doesn't reference the verification plan)
                - "Is there anything else you'd like to add?" (generic filler)

                Every question MUST reference a specific element from the Verification Builder's output.
                If the verification plan has no questionable assumptions, return an empty reviewable_sections list.

                SECTIONS TO REVIEW:
                - prediction_statement: Did the parser capture the intent correctly?
                - verifiable_category: Does the routing make sense given available tools?
                - verification_method.source: Are the data sources appropriate and accessible?
                - verification_method.criteria: Do the criteria match the prediction's intent exactly?
                - verification_method.steps: Are the steps actionable and correctly ordered?

                Return ONLY the raw JSON object. No markdown code blocks, no backticks, no explanation text before or after the JSON. The first character of your response must be { and the last must be }.

                {
                    "reviewable_sections": [
                        {
                            "section": "field_name",
                            "improvable": true,
                            "questions": ["specific question referencing the verification plan"],
                            "reasoning": "what assumption in the verification plan this question validates"
                        }
                    ]
                }

  ReviewPromptVersion:
    Type: AWS::Bedrock::PromptVersion
    Properties:
      PromptArn: !GetAtt ReviewPrompt.Arn
      Description: "v1 — initial migration from hardcoded REVIEW_SYSTEM_PROMPT"

  ReviewPromptVersionV2:
    Type: AWS::Bedrock::PromptVersion
    DependsOn: ReviewPromptVersion
    Properties:
      PromptArn: !GetAtt ReviewPrompt.Arn
      Description: "v2 — operationalization validation questions"

  ReviewPromptVersionV3:
    Type: AWS::Bedrock::PromptVersion
    DependsOn: ReviewPromptVersionV2
    Properties:
      PromptArn: !GetAtt ReviewPrompt.Arn
      Description: "v3 — targeted questions referencing specific Verification Builder assumptions"

Outputs:
  ParserPromptId:
    Value: !GetAtt ParserPrompt.Id
    Description: Parser prompt identifier for fetch_prompt()
  ParserPromptArn:
    Value: !GetAtt ParserPrompt.Arn
  CategorizerPromptId:
    Value: !GetAtt CategorizerPrompt.Id
    Description: Categorizer prompt identifier for fetch_prompt()
  CategorizerPromptArn:
    Value: !GetAtt CategorizerPrompt.Arn
  VBPromptId:
    Value: !GetAtt VBPrompt.Id
    Description: VB prompt identifier for fetch_prompt()
  VBPromptArn:
    Value: !GetAtt VBPrompt.Arn
  ReviewPromptId:
    Value: !GetAtt ReviewPrompt.Id
    Description: Review prompt identifier for fetch_prompt()
  ReviewPromptArn:
    Value: !GetAtt ReviewPrompt.Arn
