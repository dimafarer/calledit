[pytest]
# Root-level pytest configuration for Kiro IDE test discovery

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths - tell pytest where to find tests
testpaths = 
    backend/calledit-backend/tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes

# Markers for test organization
markers =
    integration: Integration tests with real agent invocations (Strands best practice)
    backward_compat: Backward compatibility tests (Task 17)
    slow: Tests that take longer to run (real LLM calls)
    requires_aws: Tests that require AWS credentials

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for long-running tests (real LLM calls can take time)
timeout = 300

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# Python path - ensure imports work from nested directories
pythonpath = backend/calledit-backend/handlers/strands_make_call

