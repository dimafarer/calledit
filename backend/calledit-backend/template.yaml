AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  calledit-backend
  Sample SAM Template for calledit-backend

Globals:
  Function:
    Timeout: 60
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON 
  Api:
    TracingEnabled: true

Resources:
  CallitAPI:
    Type: AWS::Serverless::Api
    Properties:
      Name: CallitAPI
      StageName: Prod
      TracingEnabled: true
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn     
      Cors:
        AllowMethods: '''GET,POST,OPTIONS'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        AllowOrigin: '''*'''
        MaxAge: '''600'''
        AllowCredentials: '''true'''

  LogCall:
    Type: AWS::Serverless::Function 
    Properties:
      CodeUri: handlers/write_to_db/
      Handler: write_to_db.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          ALLOWED_ORIGINS: "http://localhost:5173,https://d2k653cdpjxjdu.cloudfront.net"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: calledit-db
      Events:
        HelloWorld:
          Type: Api 
          Properties:
            Path: /log-call
            Method: post
            RestApiId: !Ref CallitAPI
            Auth:
              Authorizer: CognitoAuthorizer
              
  ListPredictions:
    Type: AWS::Serverless::Function 
    Properties:
      CodeUri: handlers/list_predictions/
      Handler: list_predictions.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          ALLOWED_ORIGINS: "http://localhost:5173,https://d2k653cdpjxjdu.cloudfront.net"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: calledit-db
      Events:
        HelloWorld:
          Type: Api 
          Properties:
            Path: /list-predictions
            Method: get
            RestApiId: !Ref CallitAPI
            Auth:
              Authorizer: CognitoAuthorizer

  AuthTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/auth_token/
      Handler: auth_token.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          USER_POOL_ID: !Ref CognitoUserPool
          CLIENT_ID: !Ref UserPoolClient
      Events:
        AuthToken:
          Type: Api
          Properties:
            Path: /auth/token
            Method: post
            RestApiId: !Ref CallitAPI


  # Add this to your existing Resources section
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-user-pool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      # Add email configuration
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      # Add verification message customization
      EmailVerificationMessage: "Your verification code is {####}"
      EmailVerificationSubject: "Your verification code"          

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: !Sub ${AWS::StackName}-client
      GenerateSecret: false
      # Add token validity durations (in days)
      RefreshTokenValidity: 30      # Extend from default 30 days to max allowed
      AccessTokenValidity: 1        # Extend from default 1 hour to 1 day (max 1 day)
      IdTokenValidity: 1            # Extend from default 1 hour to 1 day (max 1 day)
      EnableTokenRevocation: true
      # Add OAuth configuration
      CallbackURLs: 
        - http://localhost:5173/
        - https://d2k653cdpjxjdu.cloudfront.net/
      LogoutURLs:
        - http://localhost:5173/
        - https://d2k653cdpjxjdu.cloudfront.net/
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
        - aws.cognito.signin.user.admin
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - COGNITO
      # Enable authorization code grant flow
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_CUSTOM_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED


  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Domain: !Sub ${AWS::StackName}-${AWS::AccountId}-domain

  # WebSocket API resources
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: CalledItWebSocketAPI
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      OperationName: ConnectRoute
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref ConnectIntegration

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      OperationName: DisconnectRoute
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref DisconnectIntegration

  MakeCallStreamRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: makecall
      AuthorizationType: NONE
      OperationName: MakeCallStreamRoute
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref MakeCallStreamIntegration

  # NOTE: ImproveSectionRoute and ImprovementAnswersRoute were removed in v2 cleanup (Spec 1).
  # These routes handled the HITL improvement loop (improve_section, improvement_answers actions)
  # which is replaced by full graph re-trigger in Spec 2. The corresponding Lambda permissions
  # (ImproveSectionFunctionPermission, ImprovementAnswersFunctionPermission) were also removed.

  # v2: ClarifyRoute — maps the "clarify" WebSocket action to the same MakeCallStreamFunction.
  # No new Lambda needed — the handler routes internally based on the action field.
  # The clarify action triggers a full graph re-run with enriched state (round 2+).
  ClarifyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: clarify
      AuthorizationType: NONE
      OperationName: ClarifyRoute
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref MakeCallStreamIntegration

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    DependsOn: ConnectFunctionAliaslive
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectFunction.Arn}:live/invocations

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    DependsOn: DisconnectFunctionAliaslive
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DisconnectFunction.Arn}:live/invocations

  MakeCallStreamIntegration:
    Type: AWS::ApiGatewayV2::Integration
    DependsOn: MakeCallStreamFunctionAliaslive
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      # Use the alias ARN (not $LATEST) so invocations go through the published
      # version with SnapStart enabled. ${MakeCallStreamFunction.Arn} resolves to
      # $LATEST which bypasses SnapStart. The alias ARN includes :live suffix.
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MakeCallStreamFunction.Arn}:live/invocations



  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - MakeCallStreamRoute
      - ClarifyRoute
    Properties:
      ApiId: !Ref WebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      DeploymentId: !Ref WebSocketDeployment
      StageName: prod
      AutoDeploy: true

  # Lambda functions for WebSocket API
  ConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/websocket/
      Handler: connect.lambda_handler
      Runtime: python3.12
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - 'execute-api:ManageConnections'
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  DisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/websocket/
      Handler: disconnect.lambda_handler
      Runtime: python3.12
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - 'execute-api:ManageConnections'
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  MakeCallStreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/strands_make_call/
      Handler: strands_make_call_graph.lambda_handler  # Updated to use new 3-agent graph handler
      Runtime: python3.12
      Timeout: 300  # 5 minutes
      MemorySize: 512
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          PROMPT_VERSION_PARSER: "1"
          PROMPT_VERSION_CATEGORIZER: "2"
          PROMPT_VERSION_VB: "2"
          PROMPT_VERSION_REVIEW: "3"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: calledit-db
        - DynamoDBCrudPolicy:
            TableName: calledit-eval-reasoning
        - Statement:
            - Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
                - 'bedrock:ListFoundationModels'
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - 'bedrock-agent:GetPrompt'
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - 'execute-api:ManageConnections'
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  # Lambda permissions
  ConnectFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/$connect'

  DisconnectFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/$disconnect'

  # Alias permissions for SnapStart — API Gateway needs separate permission to invoke
  # the :live alias (published version) vs the unqualified function ($LATEST).
  ConnectFunctionAliasPermission:
    Type: AWS::Lambda::Permission
    DependsOn: ConnectFunctionAliaslive
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Sub '${ConnectFunction}:live'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/$connect'

  DisconnectFunctionAliasPermission:
    Type: AWS::Lambda::Permission
    DependsOn: DisconnectFunctionAliaslive
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Sub '${DisconnectFunction}:live'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/$disconnect'

  MakeCallStreamFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref MakeCallStreamFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/*'

  # Permission for API Gateway to invoke the alias (required for SnapStart).
  # The integration URI points to :live alias, which needs its own permission
  # separate from the unqualified function permission above.
  MakeCallStreamFunctionAliasPermission:
    Type: AWS::Lambda::Permission
    DependsOn: MakeCallStreamFunctionAliaslive
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Sub '${MakeCallStreamFunction}:live'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/*'





  # Verification System Resources
  VerificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-verification"
      CodeUri: handlers/verification/
      Handler: app.lambda_handler
      Runtime: python3.12
      Timeout: 300
      MemorySize: 512
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          DYNAMODB_TABLE: calledit-db
          S3_BUCKET: !Ref VerificationLogsBucket
          SNS_TOPIC_ARN: !Ref VerificationNotificationTopic
      Policies:
        - DynamoDBCrudPolicy:
            TableName: calledit-db
        - S3CrudPolicy:
            BucketName: !Ref VerificationLogsBucket
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt VerificationNotificationTopic.TopicName
        - Statement:
            - Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
              Resource: '*'
      Events:
        ScheduledVerification:
          Type: Schedule
          Properties:
            Schedule: 'rate(15 minutes)'  # Every 15 minutes
            Description: Automated prediction verification every 15 minutes
            Input: |
              {
                "source": "eventbridge",
                "action": "verify_predictions",
                "limit": null
              }

  # S3 Bucket for Verification Logs
  VerificationLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-verification-logs-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
            BucketKeyEnabled: true
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Days: 30
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA

  # SNS Topic for Verification Notifications
  VerificationNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-verification-notifications"
      DisplayName: CalledIt Verification Notifications
      KmsMasterKeyId: alias/aws/sns





  # Notification Management Function
  NotificationManagementFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-notification-management"
      CodeUri: handlers/notification_management/
      Handler: app.lambda_handler
      Runtime: python3.12
      Timeout: 30
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref VerificationNotificationTopic
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt VerificationNotificationTopic.TopicName
        - Statement:
            - Effect: Allow
              Action:
                - 'sns:Subscribe'
                - 'sns:Unsubscribe'
                - 'sns:ListSubscriptionsByTopic'
              Resource: !Ref VerificationNotificationTopic
      Events:
        SubscribeNotifications:
          Type: Api
          Properties:
            Path: /subscribe-notifications
            Method: post
            RestApiId: !Ref CallitAPI
            Auth:
              Authorizer: CognitoAuthorizer
        UnsubscribeNotifications:
          Type: Api
          Properties:
            Path: /unsubscribe-notifications
            Method: post
            RestApiId: !Ref CallitAPI
            Auth:
              Authorizer: CognitoAuthorizer
        NotificationStatus:
          Type: Api
          Properties:
            Path: /notification-status
            Method: get
            RestApiId: !Ref CallitAPI
            Auth:
              Authorizer: CognitoAuthorizer

  # Eval Reasoning Store — captures full model reasoning traces during eval runs
  EvalReasoningTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: calledit-eval-reasoning
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eval_run_id
          AttributeType: S
        - AttributeName: record_key
          AttributeType: S
      KeySchema:
        - AttributeName: eval_run_id
          KeyType: HASH
        - AttributeName: record_key
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

Outputs:
  HelloWorldApi:
    Description: API Gateway endpoint URL for Prod stage for Hello World function
    # Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/hello/"
    Value: !Sub "https://${CallitAPI}.execute-api.${AWS::Region}.amazonaws.com/Prod/hello/"

  # Add these to your existing Outputs section
  UserPoolId:
    Description: ID of the Cognito User Pool
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: ID of the Cognito User Pool Client
    Value: !Ref UserPoolClient
  UserPoolDomain:
    Description: Domain name of the Cognito User Pool
    Value: !Sub ${AWS::StackName}-${AWS::AccountId}-domain.auth.${AWS::Region}.amazoncognito.com    
  HostedUIURL:
    Description: Hosted UI URL for sign-in
    Value: !Sub https://${AWS::StackName}-${AWS::AccountId}-domain.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=code&scope=email+openid+profile&redirect_uri=localhost:5173
  WebSocketApiEndpoint:
    Description: "WebSocket API endpoint URL"
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${WebSocketStage}"
  
  # Verification System Outputs
  VerificationFunctionArn:
    Description: ARN of the verification Lambda function
    Value: !GetAtt VerificationFunction.Arn
  
  VerificationLogsBucket:
    Description: Name of the S3 verification logs bucket
    Value: !Ref VerificationLogsBucket
  
  VerificationNotificationTopic:
    Description: ARN of the SNS notification topic
    Value: !Ref VerificationNotificationTopic

  EvalReasoningTableName:
    Description: Name of the DynamoDB eval reasoning store table
    Value: !Ref EvalReasoningTable


